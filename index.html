<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para la mejor Mamá</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <!-- PANTALLA INICIAL: EL CORAZÓN -->
    <div id="seccion-inicial">
        <div class="contenedor-corazon" onclick="empezarShow()">
            <div class="corazon">❤️</div>
            <p class="texto-guia">Mamá, pulsa el corazón...</p>
        </div>
    </div>

    <!-- PÁGINA PRINCIPAL -->
    <div id="pagina" style="display: none;">
        <header class="main-header">
            <h1 class="glow-text">Para la mejor Madre del Mundo</h1>
            <p class="subtitulo">Con cariño de Los Armitas</p>
        </header>

        <div id="contenedor-scroll">
            <div id="galeria"></div>
            <div id="seccion-final">
                <div id="dedicatoria"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
